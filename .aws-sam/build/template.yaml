AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: E-Commerce Self-Healing DevOps Platform
Parameters:
  OpenRouterKey:
    Type: String
    NoEcho: true
    Description: OpenRouter API key for AI analysis
  JiraUrl:
    Type: String
    NoEcho: false
  JiraEmail:
    Type: String
    NoEcho: false
  JiraToken:
    Type: String
    NoEcho: true
  JiraProject:
    Type: String
    Default: ESH
Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        REGION: us-east-1
  Api:
    Cors:
      AllowMethods: '''POST,GET,OPTIONS'''
      AllowHeaders: '''Content-Type'''
      AllowOrigin: '''*'''
Resources:
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: '''POST,GET,OPTIONS'''
        AllowHeaders: '''Content-Type'''
        AllowOrigin: '''*'''
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: AuthFunction
      Handler: main.lambda_handler
      FunctionName: ecom-auth-service
      Policies:
      - DynamoDBCrudPolicy:
          TableName: ecom-users
      Events:
        AuthApi:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: any
            RestApiId:
              Ref: MyApi
    Metadata:
      SamResourceId: AuthFunction
  PaymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PaymentsFunction
      Handler: main.lambda_handler
      FunctionName: ecom-payments-service
      Policies:
      - DynamoDBCrudPolicy:
          TableName: ecom-payments
      Events:
        PayApi:
          Type: Api
          Properties:
            Path: /payments/{proxy+}
            Method: any
            RestApiId:
              Ref: MyApi
    Metadata:
      SamResourceId: PaymentsFunction
  ObserveFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ObserveFunction
      Handler: main.lambda_handler
      FunctionName: ecom-observe
      Timeout: 300
      Environment:
        Variables:
          TABLE_NAME: ecom-incidents
          SNS_TOPIC_ARN:
            Ref: IncidentTopic
      Policies:
      - DynamoDBCrudPolicy:
          TableName: ecom-incidents
      - SNSPublishMessagePolicy:
          TopicName: ecom-incidents
      - Statement:
        - Effect: Allow
          Action:
          - logs:FilterLogEvents
          - logs:DescribeLogGroups
          - logs:GetLogEvents
          Resource: '*'
      Events:
        ObservePost:
          Type: Api
          Properties:
            Path: /observe
            Method: post
            RestApiId:
              Ref: MyApi
        IncidentsGet:
          Type: Api
          Properties:
            Path: /incidents
            Method: get
            RestApiId:
              Ref: MyApi
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
    Metadata:
      SamResourceId: ObserveFunction
  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: AnalyzeFunction
      Handler: main.lambda_handler
      FunctionName: ecom-analyze
      Timeout: 120
      Environment:
        Variables:
          OPENROUTER_KEY:
            Ref: OpenRouterKey
          DECIDE_TOPIC_ARN:
            Ref: DecideTopic
      Policies:
      - SNSPublishMessagePolicy:
          TopicName: ecom-incidents
      - SNSPublishMessagePolicy:
          TopicName: ecom-decide
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic:
              Ref: IncidentTopic
    Metadata:
      SamResourceId: AnalyzeFunction
  IncidentTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-incidents
  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-incidents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: user_id
        AttributeType: S
      KeySchema:
      - AttributeName: user_id
        KeyType: HASH
  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-payments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: txn_id
        AttributeType: S
      KeySchema:
      - AttributeName: txn_id
        KeyType: HASH
  DecideTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-decide
  ActTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-act
  DecideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: DecideFunction
      Handler: main.lambda_handler
      FunctionName: ecom-decide
      Timeout: 60
      Environment:
        Variables:
          ACT_TOPIC_ARN:
            Ref: ActTopic
      Policies:
      - SNSPublishMessagePolicy:
          TopicName: ecom-act
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic:
              Ref: DecideTopic
    Metadata:
      SamResourceId: DecideFunction
  ActFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ActFunction
      Handler: main.lambda_handler
      FunctionName: ecom-act
      Timeout: 60
      Environment:
        Variables:
          JIRA_URL:
            Ref: JiraUrl
          JIRA_EMAIL:
            Ref: JiraEmail
          JIRA_TOKEN:
            Ref: JiraToken
          JIRA_PROJECT:
            Ref: JiraProject
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - lambda:UpdateFunctionConfiguration
          - lambda:GetFunctionConfiguration
          - lambda:PutFunctionConcurrency
          Resource: '*'
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic:
              Ref: ActTopic
    Metadata:
      SamResourceId: ActFunction
