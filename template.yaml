AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: E-Commerce Self-Healing DevOps Platform

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        REGION: us-east-1
  Api:
    Cors:
      AllowMethods: "'POST,GET,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:

  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'POST,GET,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: services/auth/
      Handler: main.lambda_handler
      FunctionName: ecom-auth-service
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecom-users
      Events:
        AuthApi:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: any
            RestApiId: !Ref ServerlessRestApi

  PaymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: services/payments/
      Handler: main.lambda_handler
      FunctionName: ecom-payments-service
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecom-payments
      Events:
        PayApi:
          Type: Api
          Properties:
            Path: /payments/{proxy+}
            Method: any
            RestApiId: !Ref ServerlessRestApi

  ObserveFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: observe/
      Handler: main.lambda_handler
      FunctionName: ecom-observe
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecom-incidents
        - SNSPublishMessagePolicy:
            TopicName: ecom-incidents
        - Statement:
            - Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:DescribeLogGroups
                - logs:GetLogEvents
              Resource: '*'
      Events:
        ObservePost:
          Type: Api
          Properties:
            Path: /observe
            Method: post
        IncidentsGet:
          Type: Api
          Properties:
            Path: /incidents
            Method: get
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: analyze/
      Handler: main.lambda_handler
      FunctionName: ecom-analyze
      Timeout: 120
      Environment:
        Variables:
          OPENROUTER_KEY: REPLACE_WITH_YOUR_KEY
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: ecom-incidents
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic: !Ref IncidentTopic

  IncidentTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-incidents

  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-incidents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-payments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: txn_id
          AttributeType: S
      KeySchema:
        - AttributeName: txn_id
          KeyType: HASH

  # SNS Topic for DECIDE
  DecideTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-decide

  # SNS Topic for ACT
  ActTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-act

  # DECIDE Lambda
  DecideFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: decide/
      Handler: main.lambda_handler
      FunctionName: ecom-decide
      Timeout: 60
      Environment:
        Variables:
          ACT_TOPIC_ARN: !Ref ActTopic
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: ecom-act
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic: !Ref DecideTopic

  # ACT Lambda
  ActFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: act/
      Handler: main.lambda_handler
      FunctionName: ecom-act
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:UpdateFunctionConfiguration
                - lambda:GetFunctionConfiguration
                - lambda:PutFunctionConcurrency
              Resource: '*'
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic: !Ref ActTopic